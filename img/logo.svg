<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Terminal window background -->
  <rect x="8" y="8" width="240" height="240" rx="16" ry="16" fill="#1a1a2e"/>
  <rect x="8" y="8" width="240" height="36" rx="16" ry="16" fill="#16213e"/>
  <rect x="8" y="28" width="240" height="16" fill="#16213e"/>

  <!-- Window dots -->
  <circle cx="30" cy="26" r="6" fill="#e74c3c"/>
  <circle cx="50" cy="26" r="6" fill="#f39c12"/>
  <circle cx="70" cy="26" r="6" fill="#2ecc71"/>

  <!-- Title text -->
  <text x="128" y="30" text-anchor="middle" font-family="monospace" font-size="13" fill="#8892b0" font-weight="bold">termchart</text>

  <!-- Candlestick chart elements -->
  <!-- Candle 1 - green up -->
  <line x1="44" y1="80" x2="44" y2="200" stroke="#2ecc71" stroke-width="2"/>
  <rect x="38" y="110" width="12" height="60" fill="#2ecc71" rx="1"/>

  <!-- Candle 2 - red down -->
  <line x1="72" y1="90" x2="72" y2="210" stroke="#e74c3c" stroke-width="2"/>
  <rect x="66" y="100" width="12" height="70" fill="#e74c3c" rx="1"/>

  <!-- Candle 3 - green up -->
  <line x1="100" y1="85" x2="100" y2="195" stroke="#2ecc71" stroke-width="2"/>
  <rect x="94" y="120" width="12" height="50" fill="#2ecc71" rx="1"/>

  <!-- Candle 4 - green up -->
  <line x1="128" y1="60" x2="128" y2="180" stroke="#2ecc71" stroke-width="2"/>
  <rect x="122" y="90" width="12" height="60" fill="#2ecc71" rx="1"/>

  <!-- Candle 5 - red down -->
  <line x1="156" y1="70" x2="156" y2="190" stroke="#e74c3c" stroke-width="2"/>
  <rect x="150" y="80" width="12" height="65" fill="#e74c3c" rx="1"/>

  <!-- Candle 6 - green up -->
  <line x1="184" y1="55" x2="184" y2="170" stroke="#2ecc71" stroke-width="2"/>
  <rect x="178" y="75" width="12" height="55" fill="#2ecc71" rx="1"/>

  <!-- Candle 7 - green up -->
  <line x1="212" y1="50" x2="212" y2="160" stroke="#2ecc71" stroke-width="2"/>
  <rect x="206" y="65" width="12" height="50" fill="#2ecc71" rx="1"/>

  <!-- Sparkline at bottom -->
  <polyline points="30,225 58,218 86,230 114,215 142,210 170,222 198,208 226,212"
            fill="none" stroke="#f39c12" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Braille-style dots overlay (subtle) -->
  <circle cx="30" cy="225" r="2.5" fill="#f39c12"/>
  <circle cx="58" cy="218" r="2.5" fill="#f39c12"/>
  <circle cx="86" cy="230" r="2.5" fill="#f39c12"/>
  <circle cx="114" cy="215" r="2.5" fill="#f39c12"/>
  <circle cx="142" cy="210" r="2.5" fill="#f39c12"/>
  <circle cx="170" cy="222" r="2.5" fill="#f39c12"/>
  <circle cx="198" cy="208" r="2.5" fill="#f39c12"/>
  <circle cx="226" cy="212" r="2.5" fill="#f39c12"/>
</svg>
